name: Deploy to Hetzner

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      tenant:
        description: "Tenant slug to deploy (leave empty for 10shrts only)"
        required: false
        default: ""

env:
  REGISTRY: ghcr.io
  MEDUSA_IMAGE: ghcr.io/${{ github.repository }}/medusa
  STOREFRONT_IMAGE: ghcr.io/${{ github.repository }}/storefront

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Build Medusa backend image ──
      - name: Build and push Medusa image
        uses: docker/build-push-action@v6
        with:
          context: ./medusa-backend/my-medusa-store
          file: ./medusa-backend/my-medusa-store/Dockerfile
          push: true
          tags: |
            ${{ env.MEDUSA_IMAGE }}:latest
            ${{ env.MEDUSA_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Build storefront image (10SHRTS) ──
      - name: Build and push Storefront image (10SHRTS)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.STOREFRONT_IMAGE }}:10shrts-latest
            ${{ env.STOREFRONT_IMAGE }}:10shrts-${{ github.sha }}
          build-args: |
            MEDUSA_BACKEND_URL=${{ secrets.MEDUSA_BACKEND_URL_10SHRTS }}
            NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY=${{ secrets.PUBLISHABLE_KEY_10SHRTS }}
            NEXT_PUBLIC_STRIPE_KEY=${{ secrets.STRIPE_PUBLIC_KEY_10SHRTS }}
            NEXT_PUBLIC_DEFAULT_REGION=dk
            NEXT_PUBLIC_BRAND_NAME=10SHRTS
            NEXT_PUBLIC_BRAND_COLOR=#ed1d27
            NEXT_PUBLIC_LOGO_URL=/images/10shirt-logo.png
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Deploy to Hetzner VPS ──
      - name: Deploy to Hetzner
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            cd /opt/10shrts

            # Pull new images
            docker compose -f docker-compose.prod.yml pull medusa-10shrts storefront-10shrts

            # Restart with new images (zero-downtime: start new before stopping old)
            docker compose -f docker-compose.prod.yml up -d --no-deps medusa-10shrts
            sleep 10
            docker compose -f docker-compose.prod.yml up -d --no-deps storefront-10shrts

            # Run database migrations
            docker compose -f docker-compose.prod.yml exec -T medusa-10shrts npx medusa db:migrate

            # Clean up old images
            docker image prune -f
